name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ClipForge ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## Download

            Choose the installer that matches your operating system:

            | System | Recommended file | Notes |
            | --- | --- | --- |
            | Windows 10/11 | `.msi` | Standard Windows installer. Use this for most Windows PCs. |
            | macOS Apple Silicon | `aarch64.dmg` | For Macs with M1, M2, M3, or newer Apple Silicon chips. |
            | macOS Intel | `x64.dmg` or `x86_64.dmg` | For older Intel-based Macs. |
            | Ubuntu/Debian Linux | `.deb` | For Ubuntu, Debian, Linux Mint, and related distributions. |
            | Fedora/RHEL/openSUSE Linux | `.rpm` | For Fedora, RHEL, CentOS Stream, openSUSE, and related distributions. |
            | Other Linux distributions | `.AppImage` | Portable Linux package. Download, mark as executable, then run. |

            Files ending in `.sig`, `.sha256`, `.blockmap`, or similar metadata names are used for verification or updates and are not installers.

            ## Install Notes

            - On macOS, if the app is blocked by Gatekeeper, right-click the app and choose Open.
            - On Linux AppImage, run `chmod +x ClipForge*.AppImage` before launching it.
            - If you are unsure which macOS package to use, choose Apple Silicon for Macs released from late 2020 onward, and Intel for older Macs.
          releaseDraft: false
          prerelease: false
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "[platform]-[arch]-[bundle]"
